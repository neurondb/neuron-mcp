# CI: Build and test neuron-mcp (Go server + client).
name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: make build

      - name: Test
        run: make test-fast

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./...
