# Manual build matrix: build, test, and lint across Go versions and OS.
name: neuron-mcp Build Matrix

on:
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test (Go ${{ matrix.go_version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go_version: ['1.22', '1.23', '1.24']
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Build
        run: make build

      - name: Test
        run: make test-fast

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./...
